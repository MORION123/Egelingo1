<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EGE Duolingo - Подготовка к ЕГЭ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="user-info">
                <span class="user-level">Уровень <span id="level">1</span></span>
                <span class="user-points">⭐️ <span id="points">0</span></span>
                <span class="user-streak">🔥 <span id="streak">0</span></span>
            </div>
        </header>

        <main class="main-content">
            <div class="subjects-grid" id="subjects">
                <!-- Предметы будут загружены динамически -->
            </div>

            <div class="daily-goal">
                <h3>Ежедневная цель</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="dailyProgress"></div>
                </div>
                <span id="dailyStats">0/30 XP</span>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="home">
                📚 Главная
            </button>
            <button class="nav-btn" data-page="profile">
                👤 Профиль
            </button>
            <button class="nav-btn" data-page="leaderboard">
                🏆 Рейтинг
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
